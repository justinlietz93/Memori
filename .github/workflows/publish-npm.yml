name: Publish to npm (TS)

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-native:
    name: native / ${{ matrix.artifact-name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: linux-x64-gnu
            rust-target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            artifact-name: linux-arm64-gnu
            rust-target: aarch64-unknown-linux-gnu
          - os: macos-latest
            artifact-name: darwin-arm64
            rust-target: aarch64-apple-darwin
          - os: macos-15-intel
            artifact-name: darwin-x64
            rust-target: x86_64-apple-darwin
            cargo-args: --no-default-features --features ort-load-dynamic
          - os: windows-latest
            artifact-name: win32-x64-msvc
            rust-target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            artifact-name: android-arm64
            rust-target: aarch64-linux-android
            cargo-args: --no-default-features --features ort-load-dynamic

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install NAPI build dependencies
        working-directory: ./core/bindings/node
        run: npm install

      - name: Set up Android SDK
        if: startsWith(matrix.artifact-name, 'android-')
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: startsWith(matrix.artifact-name, 'android-')
        run: sdkmanager "ndk;27.2.12479018"

      - name: Configure Android Rust linkers
        if: startsWith(matrix.artifact-name, 'android-')
        shell: bash
        run: |
          set -euo pipefail
          ndk_dir="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-}}"
          if [ -z "$ndk_dir" ] || [ ! -d "$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin" ]; then
            ndk_dir=""
            if [ -d "$ANDROID_HOME/ndk" ]; then
              ndk_dir="$(find "$ANDROID_HOME/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
            fi
          fi
          if [ -z "$ndk_dir" ] || [ ! -d "$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin" ]; then
            echo "Unable to locate Android NDK" >&2
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$ndk_dir" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang" >> "$GITHUB_ENV"

      - name: Set Windows C/C++ dynamic CRT flags
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "CFLAGS=/MD" >> $env:GITHUB_ENV
          echo "CXXFLAGS=/MD" >> $env:GITHUB_ENV

      - name: Build Rust bindings
        working-directory: ./core/bindings/node
        run: npm run build -- --target ${{ matrix.rust-target }} ${{ matrix.cargo-args || '' }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.artifact-name }}
          path: core/bindings/node/memori_node.${{ matrix.artifact-name }}.node
          if-no-files-found: error

  build-and-test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install NAPI build dependencies
        working-directory: ./core/bindings/node
        run: npm install

      - name: Set Windows C/C++ dynamic CRT flags
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "CFLAGS=/MD" >> $env:GITHUB_ENV
          echo "CXXFLAGS=/MD" >> $env:GITHUB_ENV

      - name: Build Rust bindings
        working-directory: ./core/bindings/node
        run: npm run build

      - name: Sync native bindings to memori-ts
        working-directory: ./memori-ts
        run: node scripts/sync-native.js

      - name: Install TypeScript dependencies
        working-directory: ./memori-ts
        run: npm ci

      - name: Generate version.ts
        working-directory: ./memori-ts
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "export const SDK_VERSION = '${VERSION}';" > src/version.ts

      - name: Build project
        working-directory: ./memori-ts
        run: npm run build

      - name: Run tests
        working-directory: ./memori-ts
        run: npm test --if-present

  publish:
    name: Publish @memorilabs/memori
    needs: [build-native, build-and-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js (Build & Publish Environment)
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install NAPI build dependencies
        working-directory: ./core/bindings/node
        run: npm install

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-downloads
          merge-multiple: false

      - name: Copy native artifacts into bindings directory
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(native-downloads/*/*.node)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No native artifacts were downloaded."
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            cp "$artifact" core/bindings/node/
          done

      - name: Install TypeScript dependencies
        working-directory: ./memori-ts
        run: npm ci

      - name: Generate version.ts
        working-directory: ./memori-ts
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "export const SDK_VERSION = '${VERSION}';" > src/version.ts

      - name: Publish @memorilabs/memori
        working-directory: ./memori-ts
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            TAG="${VERSION#*-}"
            TAG="${TAG%%.*}"
          else
            TAG="latest"
          fi

          npm publish --access public --tag "$TAG"
