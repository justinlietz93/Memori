name: Core CI

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'setup.py'
      - 'pyproject.toml'
      - 'MANIFEST.in'
      - 'memori/_rust_core.py'
      - 'tests/test_rust_core.py'
      - '.github/workflows/core-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'core/**'
      - 'setup.py'
      - 'pyproject.toml'
      - 'MANIFEST.in'
      - 'memori/_rust_core.py'
      - 'tests/test_rust_core.py'
      - '.github/workflows/core-ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-quality:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  wheel-build:
    name: cibuildwheel smoke (${{ matrix.os }} / ${{ matrix.archs }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs: x86_64
          - os: ubuntu-24.04-arm
            archs: aarch64
          - os: macos-15-intel
            archs: x86_64
          - os: macos-14
            archs: arm64
          - os: windows-latest
            archs: AMD64
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build single abi3 wheel via cibuildwheel
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_BUILD: "cp310-*"
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *-win32"
          CIBW_ARCHS: ${{ matrix.archs }}
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_MANYLINUX_AARCH64_IMAGE: "manylinux_2_28"
          # manylinux_2_28 (AlmaLinux 8) needs perl for vendored OpenSSL builds,
          # and openssl-devel/pkgconf for non-vendored host/build-script paths.
          CIBW_BEFORE_ALL_LINUX: "dnf install -y perl-core openssl-devel pkgconf-pkg-config"
          CIBW_BEFORE_BUILD_LINUX: >-
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable &&
            source $HOME/.cargo/env
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH" PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1'
          CIBW_ENVIRONMENT_MACOS: 'PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 RUSTFLAGS="-C link-arg=-undefined -C link-arg=dynamic_lookup" MACOSX_DEPLOYMENT_TARGET=11.0'
          CIBW_ENVIRONMENT_WINDOWS: 'PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 CFLAGS=/MD CXXFLAGS=/MD'
          CIBW_TEST_COMMAND: 'python -c "from importlib.metadata import version; from pathlib import Path; import memori; from memori import _rust_core; _rust_core._ensure_onnxruntime_dylib(); ort_env = _rust_core.os.environ.get(\"ORT_DYLIB_PATH\"); assert ort_env, \"ORT_DYLIB_PATH missing after bootstrap\"; ort_path = Path(ort_env); assert ort_path.exists(), ort_path; import memori_python; print(version(\"memori\"))"'
          # manylinux smoke installs pull heavy ML deps (torch + CUDA packages) and
          # can exhaust ephemeral runner disk before tests execute.
          CIBW_TEST_SKIP: "*-manylinux_x86_64"
        with:
          output-dir: wheelhouse

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: memori-wheel-${{ matrix.os }}-${{ matrix.archs }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  android-wheel-build:
    name: android wheel smoke (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64_v8a
            rust-target: aarch64-linux-android
          - arch: x86_64
            rust-target: x86_64-linux-android
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Configure Android Rust linkers
        run: |
          set -euo pipefail
          ndk_dir="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-}}"
          if [ -z "$ndk_dir" ] || [ ! -d "$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin" ]; then
            ndk_dir=""
            if [ -d "$ANDROID_HOME/ndk" ]; then
              ndk_dir="$(find "$ANDROID_HOME/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
            fi
          fi
          if [ -z "$ndk_dir" ] || [ ! -d "$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin" ]; then
            echo "Unable to locate Android NDK" >&2
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$ndk_dir" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android24-clang" >> "$GITHUB_ENV"

      - name: Build Android abi3 wheel via cibuildwheel
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_PLATFORM: android
          CIBW_BUILD: "cp314-android_${{ matrix.arch }}"
          CIBW_ARCHS_ANDROID: ${{ matrix.arch }}
          ANDROID_API_LEVEL: "24"
          CIBW_ENVIRONMENT_ANDROID: >-
            PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
            CARGO_BUILD_TARGET=${{ matrix.rust-target }}
            CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER"
            CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER="$CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER"
          # Android pip cannot resolve all memori runtime dependencies as
          # android-tagged wheels yet, so keep this job focused on wheel build.
          CIBW_TEST_SKIP: "*-android_*"
        with:
          output-dir: wheelhouse

      - name: Upload Android wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: memori-wheel-android-${{ matrix.arch }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  node-native-build:
    name: node native smoke (${{ matrix.os }} / ${{ matrix.artifact-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: linux-x64-gnu
            rust-target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            artifact-name: linux-arm64-gnu
            rust-target: aarch64-unknown-linux-gnu
          - os: macos-latest
            artifact-name: darwin-arm64
            rust-target: aarch64-apple-darwin
          - os: macos-15-intel
            artifact-name: darwin-x64
            rust-target: x86_64-apple-darwin
            cargo-args: --no-default-features --features ort-load-dynamic
          - os: windows-latest
            artifact-name: win32-x64-msvc
            rust-target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            artifact-name: android-arm64
            rust-target: aarch64-linux-android
            cargo-args: --no-default-features --features ort-load-dynamic
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install NAPI build dependencies
        working-directory: ./core/bindings/node
        run: npm install

      - name: Set up Android SDK
        if: startsWith(matrix.artifact-name, 'android-')
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: startsWith(matrix.artifact-name, 'android-')
        run: sdkmanager "ndk;27.2.12479018"

      - name: Configure Android Rust linkers
        if: startsWith(matrix.artifact-name, 'android-')
        shell: bash
        run: |
          set -euo pipefail
          ndk_dir="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-}}"
          if [ -z "$ndk_dir" ] || [ ! -d "$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin" ]; then
            ndk_dir=""
            if [ -d "$ANDROID_HOME/ndk" ]; then
              ndk_dir="$(find "$ANDROID_HOME/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
            fi
          fi
          if [ -z "$ndk_dir" ] || [ ! -d "$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin" ]; then
            echo "Unable to locate Android NDK" >&2
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$ndk_dir" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang" >> "$GITHUB_ENV"

      - name: Set Windows C/C++ dynamic CRT flags
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "CFLAGS=/MD" >> $env:GITHUB_ENV
          echo "CXXFLAGS=/MD" >> $env:GITHUB_ENV

      - name: Build Rust bindings
        working-directory: ./core/bindings/node
        run: npm run build -- --target ${{ matrix.rust-target }} ${{ matrix.cargo-args || '' }}
